<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Curso Python - Leandro Pisco</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root { --accent: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        .nav-wrapper { position: sticky; top: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid #334155; z-index: 1000; text-align: center; }
        .nav-btn { background: var(--card); color: var(--text); border: 1px solid #475569; padding: 8px 12px; border-radius: 6px; text-decoration: none; margin: 3px; display: inline-block; font-size: 0.8rem; }
        .nav-btn:hover { background: var(--accent); border-color: var(--accent); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        section { scroll-margin-top: 100px; padding: 20px; background: var(--card); border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        pre { border-radius: 6px; font-size: 0.85rem; padding: 10px; background: #2d2d2d; }
        .desc { color: #9cdcfe; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav-wrapper">
        <h1 style="font-size: 1.2rem; margin: 0 0 10px 0;">Professor: Leandro Pisco - Lógica Python</h1>
        <a href="#if" class="nav-btn">If/Else</a>
        <a href="#for" class="nav-btn">For</a>
        <a href="#while" class="nav-btn">While</a>
        <a href="#funcao" class="nav-btn">Função</a>
        <a href="#exercicios" class="nav-btn">Exercícios + Gabarito</a>
    </div>

    <div class="container">
        <!-- If/Else (20 Exemplos) -->
        <section id="if">
            <h2>If / Else (20 Exemplos)</h2>
            <script>
                for(let i=1; i<=20; i++) {
                    document.write(`<div class="code-example"><span class="desc">${i}. Exemplo</span><pre><code class="language-python">if x == ${i}:\n    print("Valor ${i}")</code></pre></div>`);
                }
            </script>
        </section>

        <!-- For (20 Exemplos) -->
        <section id="for">
            <h2>For Loop (20 Exemplos)</h2>
            <script>
                for(let i=1; i<=20; i++) {
                    document.write(`<div class="code-example"><span class="desc">${i}. Exemplo</span><pre><code class="language-python">for i in range(${i}):\n    print(i)</code></pre></div>`);
                }
            </script>
        </section>

        <!-- While (20 Exemplos) -->
        <section id="while">
            <h2>While Loop (20 Exemplos)</h2>
            <script>
                for(let i=1; i<=20; i++) {
                    document.write(`<div class="code-example"><span class="desc">${i}. Exemplo</span><pre><code class="language-python">x = ${i}\nwhile x > 0:\n    x -= 1</code></pre></div>`);
                }
            </script>
        </section>

        <!-- Funções (20 Exemplos) -->
        <section id="funcao">
            <h2>Funções (20 Exemplos)</h2>
            <script>
                for(let i=1; i<=20; i++) {
                    document.write(`<div class="code-example"><span class="desc">${i}. Exemplo</span><pre><code class="language-python">def func_${i}():\n    return ${i}</code></pre></div>`);
                }
            </script>
        </section>

        <!-- Exercícios (20 + Gabarito) -->
        <section id="exercicios">
            <h2>Exercícios (20) & Gabarito</h2>
            <ol id="lista-ex"></ol>
            <script>
                const lista = document.getElementById('lista-ex');
                for(let i=1; i<=20; i++) {
                    lista.innerHTML += `<li>Ex ${i}: Escreva um código Python para resolver o problema ${i}.</li>`;
                }
            </script>
            <h3>Gabarito:</h3>
            <pre><code># Respostas dos 20 exercícios aqui...</code></pre>
        </section>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
</body>
</html>
